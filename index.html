<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damians Rechner</title>
    <style>
        body { 
            background-color: #111; 
            color: #0f0; 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .box { 
            border: 3px solid #0f0; 
            padding: 30px; 
            border-radius: 20px; 
            background: #222; 
            width: 90%; 
            max-width: 450px; 
            text-align: center; 
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2); 
        }
        h1 { font-size: 2rem; margin-bottom: 20px; }
        input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            font-size: 1.4rem; 
            border-radius: 10px; 
            border: 1px solid #444; 
            background: #000; 
            color: #0f0; 
            box-sizing: border-box; 
        }
        button { 
            width: 100%; 
            padding: 20px; 
            background: #0f0; 
            color: #000; 
            font-size: 1.6rem; 
            font-weight: bold; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            margin-top: 20px; 
        }
        button:active { background: #0c0; transform: scale(0.98); }
        #ausgabe { 
            margin-top: 30px; 
            font-size: 1.4rem; 
            min-height: 40px; 
            padding: 10px;
            background: #333;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>DOWNLOAD CALC</h1>
    
    <input type="number" id="gbInput" placeholder="GB (z.B. 50)">
    <input type="number" id="mbitInput" placeholder="Mbit/s (z.B. 100)">
    
    <button onclick="calculate()">BERECHNEN</button>
    
    <div id="ausgabe">Ergebnis folgt...</div>
</div>

<script>
    // Die Funktion MUSS exakt so heißen wie oben im Button
    function calculate() {
        var g = document.getElementById('gbInput').value;
        var m = document.getElementById('mbitInput').value;
        var res = document.getElementById('ausgabe');

        if (g > 0 && m > 0) {
            var sek = (g * 1024) / (m / 8);
            var min = Math.round(sek / 60);
            
            if (min >= 60) {
                var h = Math.floor(min / 60);
                var mRest = min % 60;
                res.innerHTML = "Dauer: <b>" + h + " Std. " + mRest + " Min.</b>";
            } else {
                res.innerHTML = "Dauer: <b>" + min + " Min.</b>";
            }
        } else {
            res.innerHTML = "Zahlen eingeben! ❌";
        }
    }
</script>

</body>
</html>
