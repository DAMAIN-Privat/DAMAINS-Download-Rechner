<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damians Rechner</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #1a1a1a;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background-color: #2a2a2a;
            border: 3px solid #0f0;
            border-radius: 15px;
            padding: 30px;
            display: inline-block;
            max-width: 500px;
            width: 95%; 
            margin-top: 30px;
            box-sizing: border-box;
        }

        h1 { color: #0f0; font-size: 2.2rem; margin-bottom: 20px; }

        p { font-size: 1.2rem; margin-bottom: 5px; text-align: left; margin-left: 5%; color: #0f0; }

        input {
            width: 90%;
            padding: 20px;
            margin: 10px 0 25px 0;
            border-radius: 10px;
            border: none;
            font-size: 1.5rem; 
            box-sizing: border-box;
        }

        button {
            width: 90%;
            padding: 25px;
            background-color: #0f0;
            color: black;
            border: none;
            border-radius: 10px;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        button:active { background-color: #0c0; }

        #result {
            margin-top: 30px;
            font-size: 1.5rem;
            min-height: 60px;
            background: #333;
            padding: 20px;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>DOWNLOAD CALC</h1>
        
        <p>Dateigröße (GB):</p>
        <input type="number" id="gbInput" placeholder="z.B. 50">
        
        <p>Downloadspeed (Mbit/s):</p>
        <input type="number" id="mbitInput" placeholder="z.B. 100">
        
        <button onclick="calculate()">BERECHNEN</button>

        <div id="result">Ergebnis folgt...</div>

        <p style="font-size: 0.8rem; text-align: center; margin-top: 40px; color: #777;">
            &copy; 2026 DAMAIN-Studios | v1.0.0
        </p>
    </div>

    <script>
        function calculate() {
            const g = document.getElementById('gbInput').value;
            const m = document.getElementById('mbitInput').value;
            const res = document.getElementById('result');

            if (g > 0 && m > 0) {
                const sek = (g * 1024) / (m / 8);
                
                if (sek < 60) {
                    res.innerHTML = "Dauer: " + Math.round(sek) + " Sekunden";
                } else if (sek < 3600) {
                    const min = Math.round(sek / 60);
                    res.innerHTML = "Dauer: " + min + " Minute(n)";
                } else {
                    const h = Math.floor(sek / 3600);
                    const restMin = Math.round((sek % 3600) / 60);
                    res.innerHTML = "Dauer: " + h + " Std. und " + restMin + " Min.";
                }
            } else {
                res.innerHTML = "Bitte Zahlen eingeben! ❌";
            }
        }
    </script>
</body>
</html>
