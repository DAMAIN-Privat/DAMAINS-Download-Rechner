<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damians Rechner</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #1a1a1a;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background-color: #2a2a2a;
            border: 3px solid #00ff00;
            border-radius: 15px;
            padding: 30px;
            display: inline-block;
            max-width: 500px;
            width: 90%; 
            margin-top: 50px;
            box-sizing: border-box;
        }

        h1 { color: #00ff00; font-size: 2rem; }

        input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            border: none;
            font-size: 1.2rem; 
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 20px;
            background-color: #00ff00;
            color: black;
            border: none;
            border-radius: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
        }

        button:active { background-color: #00cc00; }

        #result {
            margin-top: 25px;
            font-size: 1.2rem;
            min-height: 50px;
            background: #333;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Download Rechner</h1>
        
        <p style="text-align: left; margin-left: 5%;">Dateigröße (GB):</p>
        <input type="number" id="gbInput" placeholder="z.B. 50">
        
        <p style="text-align: left; margin-left: 5%;">Downloadspeed (Mbit/s):</p>
        <input type="number" id="mbitInput" placeholder="z.B. 100">
        
        <br><br>
        <button onclick="calculate()">BERECHNEN</button>

        <div id="result">Ergebnis erscheint hier...</div>

        <p style="font-size: 0.8rem; margin-top: 30px; color: #777;">
            &copy; 2026 DAMAIN-Studios | v3.3
        </p>
    </div>

    <script>
        function calculate() {
            const gb = document.getElementById('gbInput').value;
            const mbit = document.getElementById('mbitInput').value;
            const ausgabe = document.getElementById('result');

            if (gb > 0 && mbit > 0) {
                const mbyteProSek = mbit / 8;
                const gesamtMB = gb * 1024;
                const sekunden = gesamtMB / mbyteProSek;

                if (sekunden < 60) {
                    ausgabe.innerHTML = "Dauer: <b>" + Math.round(sekunden) + " Sekunden</b>";
                } else if (sekunden < 3600) {
                    const min = Math.floor(sekunden / 60);
                    ausgabe.innerHTML = "Dauer: <b>" + min + " Minute(n)</b>";
                } else {
                    const std = Math.floor(sekunden / 3600);
                    const restMin = Math.round((sekunden % 3600) / 60);
                    ausgabe.innerHTML = "Dauer: <b>" + std + " Std. und " + restMin + " Min.</b>";
                }
            } else {
                ausgabe.innerHTML = "Bitte Zahlen eingeben! ❌";
            }
        }
    </script>
</body>
</html>
